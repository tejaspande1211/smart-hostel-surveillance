<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hostel Surveillance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-header { background: linear-gradient(135deg, #0f3460, #16213e); color: white; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
        .brand-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card">
                <div class="login-header">
                    <div class="brand-icon">&#128737;</div>
                    <h4 class="mb-0">Hostel Surveillance</h4>
                    <small class="text-light">Face Recognition System</small>
                </div>
                <div class="card-body p-4">
                    <div id="error-msg" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter username" autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password">
                    </div>
                    <button class="btn btn-primary w-100 py-2" onclick="doLogin()">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const err = document.getElementById('error-msg');
    err.classList.add('d-none');
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('role', data.role);
            window.location.href = '/dashboard';
        } else {
            err.textContent = data.error || 'Login failed';
            err.classList.remove('d-none');
        }
    } catch(e) {
        err.textContent = 'Server error';
        err.classList.remove('d-none');
    }
}
document.addEventListener('keypress', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
