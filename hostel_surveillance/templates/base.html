<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Surveillance System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard">
        <i class="fas fa-shield-alt me-2"></i>Hostel Surveillance
    </a>
    <span class="navbar-text text-white">
        <span id="nav-role" class="badge bg-secondary me-2"></span>
        <a href="#" onclick="logout()" class="text-danger text-decoration-none">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </span>
</nav>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar pt-3 min-vh-100" id="sidebar"></nav>
        <main class="col-md-10 ms-sm-auto px-4 pt-3" id="main-content"></main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
const path = window.location.pathname;
if (path === '/dashboard') loadDashboard();
else if (path === '/students') loadStudents();
else if (path === '/camera') loadCamera();
else if (path === '/alerts') loadAlerts();
else if (path === '/attendance') loadAttendance();
else if (path === '/logs') loadLogs();
else if (path === '/blacklist') loadBlacklist();
</script>
</body>
</html>
